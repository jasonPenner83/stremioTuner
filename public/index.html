<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>stremioTuner</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 0.25rem; }
    section { margin-top: 2rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.4rem; border-bottom: 1px solid #ddd; }
    button { cursor: pointer; }
    .banner { background: #fee; border: 1px solid #c00; padding: 0.5rem 1rem; margin-bottom: 1rem; display: none; }
    .add-form { display: none; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .add-form.open { display: flex; }
    select, input[type=text] { padding: 0.2rem; }
    .topbar { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; padding: 0.5rem 0.75rem; background: #f5f5f5; border: 1px solid #ddd; border-radius: 4px; }
    .topbar .link-group { display: flex; align-items: center; gap: 0.35rem; }
    .topbar a { font-weight: 600; }
    .topbar button { font-size: 0.85rem; padding: 0.1rem 0.5rem; }
    details { border: 1px solid #ddd; border-radius: 4px; margin-bottom: 0.5rem; }
    details summary { cursor: pointer; padding: 0.5rem 0.75rem; font-weight: 600; }
    details table { margin: 0 0.75rem 0.75rem; width: calc(100% - 1.5rem); }
  </style>
</head>
<body>
  <h1>stremioTuner</h1>
  <p>Manage which Stremio catalogs are broadcast as channels. Changes take effect immediately.</p>

  <nav class="topbar">
    <span class="link-group">
      <a id="m3u-link" href="/playlist.m3u" target="_blank" rel="noopener">M3U</a>
      <button type="button" data-copy-target="m3u-link">Copy</button>
    </span>
    <span class="link-group">
      <a id="epg-link" href="/epg.xml" target="_blank" rel="noopener">EPG</a>
      <button type="button" data-copy-target="epg-link">Copy</button>
    </span>
  </nav>

  <div id="banner" class="banner"></div>

  <section>
    <h2>My channels</h2>
    <table>
      <thead>
        <tr><th>Name</th><th>Mode</th><th>Min quality</th><th>Language</th><th>Enabled</th></tr>
      </thead>
      <tbody id="channels-body"></tbody>
    </table>
  </section>

  <section>
    <h2>Available catalogs</h2>
    <div id="catalogs-container"></div>
  </section>

  <script src="/admin.js"></script>
</body>
</html>
